experiment_name: main_comparison

seeds: [1, 2, 3]

simulation:
  total_time: 100
  num_tasks: 50
  arrival_rate: 0.8

nodes:
  num_nodes: 5
  compute_capacity_min: 20
  compute_capacity_max: 80
  bandwidth_min: 10.0
  bandwidth_max: 50.0
  power_coeff_min: 0.8
  power_coeff_max: 1.5

schedulers:
  - greedy
  - fixed_window
  - fixed_window_pruned
  - dynamic_window
  - dynamic_window_pruned
  - minimal_gnn

fixed_window:
  window_size: 0.3
  sort_by: deadline

dynamic_window:
  sort_by: deadline
  max_batch_size: 3
  max_wait: 0.5
  slack_trigger: 0.3

pruning:
  prune_time_factor: 0.90
  queue_wait_threshold: 0.50

task:
  deadline_min: 1.0
  deadline_max: 3.0
  workload_min: 20.0
  workload_max: 80.0
  data_size_min: 1.0
  data_size_max: 10.0

admission:
  edge_only: true
  regenerate_until_feasible: true
  max_regen_trials: 200
  feasibility_margin: 0.7
  local_deadline_threshold: 0.3

output:
  output_dir: results/raw/main_comparison
