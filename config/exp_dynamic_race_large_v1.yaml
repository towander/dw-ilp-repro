experiment_name: exp_dynamic_race_large_v1

seeds: [1, 2, 3]

simulation:
  total_time: 100
  num_tasks: 800
  arrival_rate: 4.0

nodes:
  num_nodes: 50
  compute_capacity_min: 20
  compute_capacity_max: 80
  bandwidth_min: 10.0
  bandwidth_max: 50.0
  power_coeff_min: 0.8
  power_coeff_max: 1.5

energy:
  enable: true # Whether to enable energy modeling
  battery_capacity_min: 80.0
  battery_capacity_max: 150.0
  initial_battery_ratio_min: 0.45
  initial_battery_ratio_max: 0.90
  harvest_rate_min: 0.05
  harvest_rate_max: 0.30
  min_reserve_energy: 8.0
  tx_energy_coeff: 0.03

schedulers:
  - greedy
  - fixed_window
  - fixed_window_pruned
  - fixed_window_race
  - dynamic_window
  - dynamic_window_pruned
  - dynamic_window_race

fixed_window:
  window_size: 0.30
  sort_by: deadline

dynamic_window:
  sort_by: deadline
  min_batch_size: 2
  max_batch_size: 6
  min_wait: 0.03
  max_wait: 0.20
  slack_trigger: 0.70
  queue_pressure_trigger: 0.12

gnn:
  checkpoint_path: artifacts/minimal_gnn/minimal_gnn.pt
  hidden_dim: 64
  emb_dim: 32
  dropout: 0.0
  device: cpu
  unique_server: true
  teacher: dynamic_window_pruned


pruning:
  prune_time_factor: 0.60
  queue_wait_threshold: 0.12
  enable_topk: true
  top_k_candidates: 4
  enable_energy_pruning: true
  energy_safety_factor: 1.05
  energy_wait_threshold: 0.20

task:
  deadline_min: 0.8
  deadline_max: 1.8
  workload_min: 20.0
  workload_max: 80.0
  data_size_min: 1.0
  data_size_max: 10.0

admission:
  edge_only: true
  regenerate_until_feasible: true
  max_regen_trials: 800
  feasibility_margin: 0.7
  local_deadline_threshold: 0.3

output:
  output_dir: results/raw/exp_dynamic_race_large_v1
